<body class="antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const Icon = ({ name, size = 20, className = "" }) => {
      useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name, size, className]);
      return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
    };

    // ==========================================
    // 공통 주의사항 데이터 (VUNO 참고 변형 - 메인 화면 하단 고정용)
    // ==========================================
    const precautionData = {
      id: 'general-precautions',
      icon: 'alert-triangle',
      title: '의료진 사용 시 주의 및 경고 사항',
      subtitle: 'MPS 리포트 활용에 대한 임상적 주의사항',
      content: (
        <div className="modal-prose text-left">
          <h4><Icon name="info" size={18} className="text-slate-600"/> 가. 일반적 주의</h4>
          <ul className="text-[12px] space-y-1">
            <li>본 소프트웨어(MPS REPORT)는 <b>의료인의 진단을 보조하기 위한 참고용 데이터 시각화 프로그램</b>으로, 본 리포트에만 의지하여 진단, 치료 등 환자의 건강에 영향을 미칠 수 있는 결정을 내리는 경우 오진 가능성을 배제할 수 없습니다.</li>
            <li>의료진은 환자의 다른 임상정보(문진, 맥진, 망진 등)를 포함하여 체계적인 검토와 분석을 통해 <b>최종 변증(辨證) 및 처방을 판단</b>해야 합니다.</li>
            <li>의학적으로 잘 훈련된 한의사 및 관련 의료진이 사용하여야 합니다.</li>
          </ul>

          <h4><Icon name="x-circle" size={18} className="text-slate-600"/> [측정 불가/오류(Ungradable) 주의 사례]</h4>
          <p className="text-[12px]">다음과 같은 상황에서는 데이터에 심각한 오차가 발생할 수 있으므로 재측정 및 주의가 필요합니다.</p>
          <ul className="text-[12px] bg-slate-50 p-3 rounded-lg border border-slate-200">
            <li><b>자율신경(HRV):</b> 측정 중 환자가 심하게 움직이거나 말을 한 경우, 센서 접촉 불량.</li>
            <li><b>체성분(ECW):</b> 환자 몸에 금속 물질이 남아있거나, 식사 직후/격렬한 운동 직후에 측정한 경우.</li>
            <li><b>초음파(USG):</b> 초음파 젤이 부족하여 공기층이 섞인 영상, 프로브의 각도가 정면이 아닌 대각선으로 빗나간 경우, 주요 판독 영역(건 부착부 등)이 짤린 경우.</li>
          </ul>

          <h4><Icon name="alert-octagon" size={18} className="text-red-600"/> 나. 경고 사항</h4>
          <div className="km-box warning">
            <ul className="text-[12px] !mb-0 text-red-900">
              <li><b>측정 및 분석 결과는 반드시 주치의(한의사)의 최종 판단을 필요로 합니다.</b></li>
              <li>최종 진단 및 부모 상담 시, 리포트의 수치적 데이터와 <b>환자의 실제 임상 증상(통증, 피로 호소 등)</b>을 신중히 비교 및 대조하여야 합니다.</li>
            </ul>
          </div>
        </div>
      )
    };

    // ==========================================
    // DATA 1: M-REPORT (Mental Performance)
    // ==========================================
    const mGuideData = [
      {
        id: 'm-overview',
        icon: 'brain',
        title: 'M-REPORT 개요 및 총평 (MGI)',
        subtitle: 'MGI 척도 해석 및 한의학적 멘탈 접근법',

          <div className="modal-prose">
            <h4><Icon name="info" size={18} className="text-mental-600"/> M-REPORT 목적</h4>
            <p>

            </p>
            
            <h4><Icon name="bar-chart-2" size={18} className="text-mental-600"/> MGI (Mental Growth Index) 해석 기준</h4>
            <p>전체 13개 지표의 평균 종합 점수(6.0 만점)입니다.</p>
            <div className="space-y-2 mb-4">
              <div className="flex items-center gap-2"><span className="px-2 py-1 bg-mental-100 text-mental-700 text-[10px] font-bold rounded">4.8 이상</span> <span className="text-sm font-bold">강점 (매우 탄탄함)</span></div>
              <div className="flex items-center gap-2"><span className="px-2 py-1 bg-green-100 text-green-700 text-[10px] font-bold rounded">4.2 ~ 4.7</span> <span className="text-sm font-bold">양호 (안정적 구간)</span></div>
              <div className="flex items-center gap-2"><span className="px-2 py-1 bg-yellow-100 text-yellow-700 text-[10px] font-bold rounded">3.6 ~ 4.1</span> <span className="text-sm font-bold">보통 (강점/보완점 혼재)</span></div>
              <div className="flex items-center gap-2"><span className="px-2 py-1 bg-red-100 text-red-700 text-[10px] font-bold rounded">3.5 이하</span> <span className="text-sm font-bold">주의 (에너지 고갈, 멘탈 지지 필요)</span></div>
            </div>

            <h4><Icon name="activity" size={18} className="text-mental-600"/> 스포츠 한의학적 관점 (심신일여)</h4>
            <div className="km-box mental">
              <p className="font-bold text-mental-800 text-sm mb-1">한의학에서는 멘탈과 피지컬을 하나로 봅니다 (心身一여).</p>
              <ul className="!mb-0 text-[12px] space-y-1">
                <li><b>심담허겁(心膽虛怯):</b> 수행 불안, 과도한 긴장, 실전에서 제 실력을 못 냄. (경기 전 복통, 불면 동반)</li>
                <li><b>간기울결(肝氣鬱結):</b> 실수 후 회복력 저하, 잦은 자책, 분노 조절 어려움. (가슴 답답함, 한숨 동반)</li>
                <li><b>심비양허(心脾兩虛):</b> 집중력 저하, 무기력, 훈련 태도 저하. 체력(기허)이 떨어지면서 뇌로 가는 혈류가 부족해짐.</li>
              </ul>
              <p className="text-[11px] text-mental-700 mt-2 font-medium">※ M-REPORT의 낮은 점수는 단순한 '의지 부족'이 아니라 <b>기혈(氣血)의 불균형 상태</b>임을 부모님께 인지시키고 침/약침/한약 치료의 당위성을 설명합니다.</p>
            </div>
          </div>
        )
      },
      {
        id: 'm-core5',
        icon: 'target',
        title: '5대 핵심 멘탈지수 정밀 판독',
        subtitle: '경기 긴장 관리, 회복력 등 코어 지표 분석',
        content: (
          <div className="modal-prose">
            <p>경기의 성패를 좌우하는 가장 핵심적인 5가지 요인입니다. 3.5점 이하일 경우 즉각적인 개입이 필요합니다.</p>
            
            <div className="border-l-4 border-mental-500 pl-3 mb-4">
              <h4 className="!mt-0 !mb-1 text-[15px]">1. 경기 긴장 관리 (수행 불안)</h4>
              <p className="!mb-1">압박 상황에서도 평정심을 유지하는 힘. 낮을 경우 큰 경기에서 실수가 급증합니다.</p>
              <div className="text-[11px] bg-slate-50 p-2 rounded leading-relaxed">
                <b>강화:</b> 자신만의 루틴 만들기 (예: 입장 전 심호흡 3번), 불안을 긍정적 흥분으로 재해석하기.<br/>
                <b>처방:</b> 온담탕(溫膽湯), 청심환 류 (심담허겁 치료)
              </div>
            </div>

            <div className="border-l-4 border-mental-500 pl-3 mb-4">
              <h4 className="!mt-0 !mb-1 text-[15px]">2. 실수 후 회복력</h4>
              <p className="!mb-1">실수 뒤 감정에 머물지 않고 즉시 다음 플레이로 돌아오는 힘입니다.</p>
              <div className="text-[11px] bg-slate-50 p-2 rounded leading-relaxed">
                <b>강화:</b> '멘탈 셧다운(Shutdown)' 훈련. 실수 직후 손뼉을 치거나 특정 단어("다음 공!")를 외쳐 상황을 강제 종료시킴.<br/>
                <b>처방:</b> 소요산(逍遙散), 시호가용골모려탕 (울결된 간기를 소통)
              </div>
            </div>

            <div className="border-l-4 border-slate-300 pl-3 mb-4">
              <h4 className="!mt-0 !mb-1 text-[15px]">3. 집중 자기조절력</h4>
              <p className="!mb-1">감정과 충동이 흔들릴 때 본래 전술과 포지션에 집중하는 통제력입니다.</p>
              <div className="text-[11px] bg-slate-50 p-2 rounded leading-relaxed">
                <b>강화:</b> 3초 호흡법, 화가 날 때 스스로에게 "지금 내 포지션 롤은?" 질문하기.<br/>
                <b>처방:</b> 귀비탕(歸脾湯), 총명탕 류 (심비양허 보완 및 인지기능 개선)
              </div>
            </div>

            <div className="border-l-4 border-slate-300 pl-3 mb-4">
              <h4 className="!mt-0 !mb-1 text-[15px]">4. 경기 준비 능력</h4>
              <p className="!mb-1">목표 설정과 시뮬레이션(루틴) 능력입니다. 체계적인 선수는 이 지표가 높습니다.</p>
              <div className="text-[11px] bg-slate-50 p-2 rounded leading-relaxed">
                <b>강화:</b> 경기 전날 장비 챙기기, 수면 시간 지키기 등 본인만의 체크리스트 작성.
              </div>
            </div>

            <div className="border-l-4 border-slate-300 pl-3 mb-4">
              <h4 className="!mt-0 !mb-1 text-[15px]">5. 주변 지원 환경</h4>

              <div className="text-[11px] bg-slate-50 p-2 rounded leading-relaxed">

              </div>
            </div>
          </div>
        )
      },
      {
        id: 'm-detail8',
        icon: 'layers',
        title: '8대 세부 심리지표 분석',
        subtitle: '심상 훈련, 평가 독립성, 실패 회복력 등',

          <div className="modal-prose">

            <div className="space-y-3">

                <p className="text-[11px] text-slate-600 mb-1">경기 흐름(템포, 벤치 분위기, 실점)이 불리해질 때 무너지지 않는 능력.</p>
                <p className="text-[11px] text-mental-600 font-bold">코칭: 경기 전 '불안 시 대처 행동 1가지' 미리 정해두기.</p>
              </div>

              <div className="bg-white border border-slate-200 rounded-lg p-3 shadow-sm">
                <div className="font-bold text-sm text-slate-800 mb-1">3. 평가 독립성</div>
                <p className="text-[11px] text-slate-600 mb-1">코치나 부모, 관중의 반응에 흔들리지 않고 내 플레이를 유지하는 능력. (요즘 유소년들에게 가장 취약한 지표)</p>
                <p className="text-[11px] text-mental-600 font-bold">코칭: 벤치나 부모님석 쳐다보지 않기 루틴. 스스로 '오늘의 미션' 평가하기.</p>
              </div>

              <div className="bg-white border border-slate-200 rounded-lg p-3 shadow-sm">
                <div className="font-bold text-sm text-slate-800 mb-1">4. 자기조절 학습 & 5. 훈련 태도</div>
                <p className="text-[11px] text-slate-600 mb-1">스스로 약점을 분석하고 훈련에 몰입하는 성실성 지표.</p>
                <p className="text-[11px] text-mental-600 font-bold">코칭: 매 훈련 직후 "오늘 배운 것 1줄 노트 쓰기" 지도.</p>
              </div>

        <div className="min-h-screen login-bg flex items-center justify-center p-5 relative overflow-hidden">
          {/* Decorative background elements matching VUNO feel */}
          <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-brand-500/20 rounded-full blur-[100px]"></div>
          <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-500/20 rounded-full blur-[100px]"></div>

          <div className="w-full max-w-[360px] bg-slate-900/60 backdrop-blur-xl p-8 rounded-2xl border border-slate-700/50 shadow-2xl relative z-10 fade-in">
            <div className="flex flex-col items-center mb-8">
              <div className="w-14 h-14 bg-brand-500 rounded-xl flex items-center justify-center mb-4 shadow-[0_0_20px_rgba(20,184,166,0.3)]">
                <Icon name="bar-chart-2" size={32} className="text-white" />
              </div>
              <h1 className="text-2xl font-extrabold text-white tracking-tight">MPS REPORT</h1>
              <p className="text-brand-400 text-xs font-semibold tracking-widest mt-1 uppercase">Clinical Guide</p>
            </div>

            <form onSubmit={handleSubmit} className="space-y-5">
              <div>
                <label className="block text-[11px] font-bold text-slate-400 mb-1.5 ml-1">의료진 이름 (ID)</label>
                <div className="relative">
                  <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <Icon name="user" size={16} className="text-slate-500" />
                  </div>
                  <input
                    type="text"
                    value={userId}
                    onChange={(e) => { setUserId(e.target.value); setError(''); }}
                    placeholder="이름을 입력하세요"
                    className="w-full bg-slate-800/80 border border-slate-600 text-white text-sm rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 block pl-10 p-3 transition-colors placeholder-slate-600"
                  />
                </div>
              </div>

              <div>
                <label className="block text-[11px] font-bold text-slate-400 mb-1.5 ml-1">인증 코드 (Password)</label>
                <div className="relative">
                  <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <Icon name="lock" size={16} className="text-slate-500" />
                  </div>
                  <input
                    type="password"
                    value={password}
                    onChange={(e) => { setPassword(e.target.value); setError(''); }}
                    placeholder="코드를 입력하세요"
                    className="w-full bg-slate-800/80 border border-slate-600 text-white text-sm rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 block pl-10 p-3 transition-colors placeholder-slate-600"
                  />
                </div>
              </div>

              {error && (
                <div className="text-red-400 text-xs font-bold text-center bg-red-900/30 py-2 rounded-lg border border-red-800/50">
                  {error}
                </div>
              )}

              <button
                type="submit"
                className="w-full text-white bg-brand-600 hover:bg-brand-500 focus:ring-4 focus:outline-none focus:ring-brand-500/50 font-bold rounded-lg text-sm px-5 py-3.5 text-center transition-all shadow-[0_4px_14px_rgba(13,148,136,0.3)] mt-2"
              >
                Sign In
              </button>
            </form>
          </div>
        </div>
      );
    };

    // ==========================================
    // Main App Component
    // ==========================================
    const App = () => {
      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [loggedInUser, setLoggedInUser] = useState('');
      
      const [activeTab, setActiveTab] = useState('P'); // Default to P-REPORT
      const [activeModal, setActiveModal] = useState(null);
      const [isClosing, setIsClosing] = useState(false);

      useEffect(() => {
        if (activeModal) document.body.style.overflow = 'hidden';
        else document.body.style.overflow = 'auto';
        return () => { document.body.style.overflow = 'auto'; }
      }, [activeModal]);

      const handleLogin = (userId) => {
        setLoggedInUser(userId);
        setIsLoggedIn(true);
      };

      const openModal = (id) => {
        setActiveModal(id);
        setIsClosing(false);
      };

      const closeModal = () => {
        setIsClosing(true);
        setTimeout(() => {
          setActiveModal(null);
          setIsClosing(false);
        }, 300);
      };

      if (!isLoggedIn) {
        return <Login onLogin={handleLogin} />;
      }

      const currentGuideData = 
        activeTab === 'M' ? mGuideData : 
        activeTab === 'P' ? pGuideData : 
        sGuideData;

      const activeData = [...mGuideData, ...pGuideData, ...sGuideData].find(d => d.id === activeModal);

      const getThemeConfig = (tab) => {
        switch(tab) {
          case 'M': return { tabBg: 'bg-mental-600 text-white', iconBg: 'bg-mental-100 text-mental-700', activeTabClass: 'bg-white text-mental-700 shadow-sm', tabBtnHover: 'hover:text-mental-600' };
          case 'P': return { tabBg: 'bg-physio-600 text-white', iconBg: 'bg-physio-100 text-physio-700', activeTabClass: 'bg-white text-physio-700 shadow-sm', tabBtnHover: 'hover:text-physio-600' };
          case 'S': return { tabBg: 'bg-structure-600 text-white', iconBg: 'bg-structure-100 text-structure-700', activeTabClass: 'bg-white text-structure-700 shadow-sm', tabBtnHover: 'hover:text-structure-600' };
          default: return { tabBg: 'bg-slate-800 text-white', iconBg: 'bg-slate-100 text-slate-700', activeTabClass: 'bg-white text-slate-700 shadow-sm', tabBtnHover: 'hover:text-slate-700' };
        }
      };

      const theme = getThemeConfig(activeTab);

      return (
        <div className="min-h-screen pb-safe fade-in">
          {/* Main Header */}
          <header className="glass-header sticky top-0 z-10 pt-5 pb-3 px-5 shadow-sm border-b border-slate-200">
            <div className="flex items-center justify-between mb-4">
              <div className="flex items-center gap-3">
                <div className={`w-9 h-9 rounded-xl ${theme.tabBg} flex items-center justify-center shadow-lg transition-all duration-300`}>
                  <Icon name="book-open-check" size={20} />
                </div>
                <div>
                  <h1 className="text-slate-900 font-extrabold text-[19px] leading-tight tracking-tight">MPS 의료진 매뉴얼</h1>
                  <p className="text-slate-500 text-[11px] font-bold tracking-wide uppercase mt-0.5">Clinical Interpretation Guide</p>
                </div>
              </div>
              <div className="flex flex-col items-end">
                <span className="text-[10px] text-slate-400 font-bold">로그인됨</span>
                <span className="text-xs font-extrabold text-brand-600">{loggedInUser} 원장님</span>
              </div>
            </div>
            
            {/* Custom Segmented Control */}
            <div className="flex bg-slate-100/80 p-1.5 rounded-xl border border-slate-200/50 backdrop-blur-sm">
              <button 
                onClick={() => setActiveTab('M')} 
                className={`flex-1 py-2.5 text-[13px] font-extrabold rounded-lg transition-all duration-200 ${activeTab === 'M' ? theme.activeTabClass : `text-slate-500 ${getThemeConfig('M').tabBtnHover}`}`}
              >
                M-REPORT
              </button>
              <button 
                onClick={() => setActiveTab('P')} 
                className={`flex-1 py-2.5 text-[13px] font-extrabold rounded-lg transition-all duration-200 ${activeTab === 'P' ? theme.activeTabClass : `text-slate-500 ${getThemeConfig('P').tabBtnHover}`}`}
              >
                P-REPORT
              </button>
              <button 
                onClick={() => setActiveTab('S')} 
                className={`flex-1 py-2.5 text-[13px] font-extrabold rounded-lg transition-all duration-200 ${activeTab === 'S' ? theme.activeTabClass : `text-slate-500 ${getThemeConfig('S').tabBtnHover}`}`}
              >
                S-REPORT
              </button>
            </div>
          </header>

          {/* List Content */}
          <main className="p-4 max-w-md mx-auto space-y-3 pb-8">
            <div className="bg-white rounded-xl p-4 shadow-sm border border-slate-200/70 mb-2">
              <p className="text-[13px] text-slate-600 leading-relaxed font-semibold">
                아래 항목을 탭하여 <b>{activeTab === 'M' ? '멘탈 및 심리 기술' : activeTab === 'P' ? '부상 예측 및 피지컬' : '성장 곡선 및 PHV'}</b> 분석에 대한 상세 판독 기준과 한의학적 상담 가이드를 확인하세요.
              </p>
            </div>

            {currentGuideData.map((item, index) => (
              <button
                key={item.id}
                onClick={() => openModal(item.id)}
                className="guide-card w-full text-left bg-white rounded-2xl p-4 shadow-sm border border-slate-200/60 flex items-start gap-4 transition-transform duration-150 active:bg-slate-50"
              >
                <div className={`w-11 h-11 rounded-full flex items-center justify-center shrink-0 ${theme.iconBg}`}>
                  <Icon name={item.icon} size={22} />
                </div>
                <div className="flex-1 min-w-0 pt-0.5">
                  <h3 className="font-extrabold text-slate-900 text-[15px] mb-1 truncate">{item.title}</h3>
                  <p className="text-[12px] text-slate-500 line-clamp-2 leading-snug font-medium">{item.subtitle}</p>
                </div>
                <div className="pt-2 text-slate-300 shrink-0">
                  <Icon name="chevron-right" size={20} />
                </div>
              </button>
            ))}

            {/* 고정된 정적 컴포넌트: 의료진 주의사항 및 법적 고지 (최하단 고정 노출) */}
            <div className="pt-6 mt-6 border-t-2 border-slate-200 border-dashed">
              <div className="bg-white rounded-2xl p-5 shadow-md border border-slate-200">
                <div className="flex items-center gap-2 mb-4 pb-3 border-b border-slate-100">
                  <div className="w-8 h-8 rounded-full bg-slate-800 text-white flex items-center justify-center">
                    <Icon name={precautionData.icon} size={16} />
                  </div>
                  <div>
                    <h3 className="font-extrabold text-slate-900 text-[15px]">{precautionData.title}</h3>
                    <p className="text-[11px] text-slate-500 font-medium">{precautionData.subtitle}</p>
                  </div>
                </div>
                
                {/* 모달이 아닌 컴포넌트 내부에 직접 렌더링 */}
                {precautionData.content}
              </div>
            </div>
          </main>

          {/* Full Screen Modal */}
          {activeModal && activeData && (
            <div 
              className={`fixed inset-0 z-50 flex items-end justify-center bg-slate-900/50 backdrop-blur-sm ${isClosing ? 'opacity-0 transition-opacity duration-300' : 'overlay-enter'}`}
              onClick={closeModal}
            >
              <div 
                className={`bg-white w-full max-w-md h-[88vh] rounded-t-3xl flex flex-col shadow-2xl ${isClosing ? 'modal-leave' : 'modal-enter'}`}
                onClick={(e) => e.stopPropagation()}
              >
                {/* Modal Drag Handle */}
                <div className="w-full flex justify-center pt-3 pb-1 shrink-0" onClick={closeModal}>
                  <div className="w-12 h-1.5 bg-slate-300 rounded-full"></div>
                </div>

                {/* Modal Header */}
                <div className="px-6 py-4 border-b border-slate-100 flex items-center justify-between shrink-0 bg-white">
                  <div className="flex items-center gap-3">
                    <div className={`w-10 h-10 rounded-full ${theme.iconBg} flex items-center justify-center shadow-sm`}>
                      <Icon name={activeData.icon} size={20} />
                    </div>
                    <h2 className="font-extrabold text-slate-900 text-[16px] leading-tight max-w-[220px]">{activeData.title}</h2>
                  </div>
                  <button 
                    onClick={closeModal}
                    className="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 active:bg-slate-300 transition-colors"
                  >
                    <Icon name="x" size={18} />
                  </button>
                </div>
                
                {/* Modal Body */}
                <div className="p-6 overflow-y-auto overscroll-contain flex-1 bg-white pb-10">
                  {activeData.content}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
